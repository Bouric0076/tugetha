spring:
  application:
    name: tugetha-api

  datasource:
    url: jdbc:postgresql://localhost:5432/tugetha
    username: tugetha_user
    password: tugethaadmin2025%
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080