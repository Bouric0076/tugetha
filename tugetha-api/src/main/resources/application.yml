spring:
  application:
    name: tugetha-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tugetha}
    username: ${DB_USERNAME:tugetha_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

tugetha:
  auth:
    provider: ${AUTH_PROVIDER:firebase}
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

server:
  port: ${PORT:8080}
